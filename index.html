    <!-- ─────────────────────────────────────────────────────────────────────
         Boot asset recovery guard  (fix/boot-asset-recovery-guard-hardening)
         Recupera de 404 transitório dos assets do BUILD (entry-point, vendor
         chunks via modulepreload, e CSS principal) durante a janela de
         propagação de um deploy do Vercel (version skew por deploys de alta
         frequência).

         POR QUE INLINE E NO TOPO DO <head>: toda a recuperação de chunk do app
         (vite:preloadError em main.tsx, SW_STALE_CHUNK, chunk-recovery.ts) vive
         DENTRO do bundle. Se o próprio entry-point (ou um vendor chunk de
         dependência estática via modulepreload) falha ao carregar, main.tsx
         nunca executa e nenhum desses handlers é instalado → tela branca
         permanente até reload manual. Este guard é a ÚNICA camada capaz de
         resgatar esse caso, e precisa estar ativo ANTES de o entry
         <script type="module"> (injetado logo abaixo pelo Vite) carregar.

         DETALHE TÉCNICO: erros de carregamento de RECURSO (script/link) não
         borbulham — só são capturáveis na fase de captura, por isso
         addEventListener('error', ..., true). Um <script type="module"> dispara
         'error' se ELE ou QUALQUER dependência estática (modulepreload) falhar,
         então um único handler cobre entry + todos os vendor chunks + CSS.

         À PROVA DE LOOP (storage-free): o contador de tentativas vive na URL
         (params __bare/__bart), não em sessionStorage. Isso garante o cap de
         reloads MESMO quando sessionStorage está indisponível/lança exceção
         (modo restrito), eliminando o loop infinito que um contador em storage
         teria numa falha PERMANENTE de asset. Máx 2 hard-reloads numa janela de
         20s a partir da 1ª tentativa; após a janela, reseta sozinho (permite
         recuperar de um skew futuro independente). Coalesce múltiplos erros de
         asset do mesmo load num único reload.
    ──────────────────────────────────────────────────────────────────────── -->
    <script>
      (function () {
        var PARAM = '__bare';  /* contador de tentativas (sobrevive a reload sem storage) */
        var TPARAM = '__bart'; /* epoch ms da 1a tentativa (define a janela de auto-reset) */
        var MAX = 2;           /* maximo de hard-reloads por janela */
        var WINDOW = 20000;    /* ms; apos isso o contador reseta sozinho */
        var BACKOFF = 800;     /* espera antes do reload p/ dar tempo de propagacao do edge */
        var scheduled = false; /* coalesce multiplos erros de asset do mesmo load */

        function isCriticalBuildAsset(t) {
          if (!t || !t.tagName) return false; /* ignora erros de runtime JS (target=window) */
          if (t.tagName === 'SCRIPT') {
            return !!t.src && t.src.indexOf('/assets/') !== -1;
          }
          if (t.tagName === 'LINK') {
            if (!t.href || t.href.indexOf('/assets/') === -1) return false;
            var rel = t.rel || '';
            return rel === 'stylesheet' || rel === 'modulepreload' || rel === 'preload';
          }
          return false;
        }

        /* Le o estado da URL e aplica auto-reset por janela. Storage-free. */
        function readState() {
          var n = 0, firstAt = 0;
          try {
            var sp = new URL(window.location.href).searchParams;
            n = parseInt(sp.get(PARAM), 10);
            firstAt = parseInt(sp.get(TPARAM), 10);
            if (!isFinite(n) || n < 0) n = 0;
            if (!isFinite(firstAt) || firstAt < 0) firstAt = 0;
          } catch (_) { n = 0; firstAt = 0; }
          var now = Date.now();
          if (n === 0 || !firstAt || (now - firstAt) > WINDOW) { n = 0; firstAt = now; }
          return { n: n, firstAt: firstAt };
        }

        window.addEventListener('error', function (e) {
          if (!isCriticalBuildAsset(e && e.target)) return;
          if (scheduled) return; /* ja agendou um reload neste load */
          var s = readState();
          if (s.n >= MAX) return; /* esgotou tentativas -> nao recarrega (evita loop) */
          scheduled = true;
          var next = s.n + 1;
          var firstAt = s.firstAt;
          setTimeout(function () {
            try {
              var u = new URL(window.location.href);
              u.searchParams.set(PARAM, String(next));
              u.searchParams.set(TPARAM, String(firstAt));
              window.location.replace(u.toString());
            } catch (_) {
              window.location.reload();
            }
          }, BACKOFF);
        }, true); /* capture=true: erros de recurso nao borbulham */
      })();
    </script>

    <!-- Security Headers -->
    <!--
      Os cabeçalhos abaixo são entregues como HTTP headers reais via `public/_headers`
      e `vercel.json` (X-Frame-Options, Strict-Transport-Security, Permissions-Policy,
      frame-ancestors da CSP e cabeçalhos relacionados). Aqui mantemos apenas as
      diretivas que funcionam corretamente como <meta http-equiv> — o navegador
      ignora as demais (como Permissions-Policy, removido nesta etapa) e emite
      warnings no console do preview.
    -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />

  <body style="background-color: #0a0a0a; margin: 0;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Inline critical: previne FOUC — aplica preset-id salvo antes do React montar -->
    <script>
      (function(){
        // App sempre roda em dark mode
        document.documentElement.classList.add('dark');
        document.documentElement.classList.remove('light');
        try {
          var raw = localStorage.getItem('gifts-store-theme-config');
          if (raw) {
            var cfg = JSON.parse(raw);
            if (cfg && cfg.presetId) {
              document.documentElement.setAttribute('data-preset-id', cfg.presetId);
            }
          }
        } catch(e) {}
      })();
    </script>
  </body>
