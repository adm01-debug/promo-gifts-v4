name: CI - Replenishment Module Quality Gate

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        
      - name: Lint check
        run: bun run lint
        
      - name: Type check
        run: bunx tsc --noEmit
        
      - name: Run Module Tests (Unit & Integration)
        run: bunx vitest run src/hooks/products/__tests__/useReplenishments.integration.test.ts
        
      - name: Run E2E Tests (Smoke)
        run: |
          bunx playwright install --with-deps chromium
          bunx playwright test tests/e2e/replenishment-flows.spec.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Coverage Report
        run: bunx vitest run --coverage --include="src/hooks/products/useReplenishments.ts"
