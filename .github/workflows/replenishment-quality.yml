name: CI - Replenishment Module Quality Gate

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        
      - name: Lint check
        run: bun run lint
        
      - name: Type check
        # Usa o gate de baseline (não o tsc raw) para evitar falha em erros
        # pré-existentes rastreados em .tsc-baseline.json.
        run: node scripts/check-tsc-baseline.mjs
        
      - name: Run Module Tests (Unit & Integration)
        run: bunx vitest run src/hooks/products/__tests__/useReplenishments.integration.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        
      - name: Run E2E Tests (Smoke)
        # continue-on-error: E2E smoke requires a running dev server and Supabase backend;
        # the audit job focuses on unit/integration quality, so E2E is best-effort here.
        continue-on-error: true
        run: |
          bunx playwright install --with-deps chromium
          bunx playwright test e2e/replenishment-stress.spec.ts --pass-with-no-tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: E2E — Paridade visual /novidades vs /reposicao (informativo)
        # Roda primeiro em modo informativo para coletar artefatos mesmo se falhar.
        id: card_parity_info
        continue-on-error: true
        run: |
          bunx playwright install --with-deps chromium
          npm run test:e2e:card-parity -- --pass-with-no-tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Card parity — gate estrito (tolerância 4px)
        # Falha o workflow se widthDiff/heightDiff > 4px ou ratio fora de [0.9, 1.1].
        # Só ativa quando os secrets de auth estão presentes (do contrário, skipa).
        if: ${{ env.E2E_USER_EMAIL != '' && env.E2E_USER_PASSWORD != '' }}
        run: |
          echo "::group::Card parity strict run (sem --pass-with-no-tests)"
          npm run test:e2e:card-parity
          echo "::endgroup::"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright artifacts (parity)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-parity-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore


      - name: Coverage Report
        # continue-on-error: coverage is informational; --include was removed in Vitest 4.x
        continue-on-error: true
        run: bunx vitest run --coverage "src/hooks/products/__tests__/useReplenishments*"
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

  card-parity-matrix:
    # Roda a spec de paridade /novidades vs /reposicao em uma matriz de
    # projects do Playwright (cada project = combinação browser × viewport
    # definida em playwright.config.ts). Cobre desktop (chromium/firefox/
    # webkit) e mobile (Chrome/Safari) em paralelo.
    runs-on: ubuntu-latest
    needs: audit
    strategy:
      fail-fast: false
      matrix:
        project:
          - chromium-authed
          - firefox-authed
          - webkit-authed
          - mobile-chrome
          - mobile-safari
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps

      - name: Run card-parity (${{ matrix.project }}) — informativo
        # Sem secrets de auth, a spec é pulada por requireAuth(); ainda
        # assim coletamos artefatos para inspeção.
        continue-on-error: true
        run: |
          bunx playwright test e2e/catalog/novidades-reposicao-card-parity.spec.ts \
            --project=${{ matrix.project }} \
            --reporter=list \
            --pass-with-no-tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Run card-parity (${{ matrix.project }}) — gate estrito 4px
        if: ${{ env.E2E_USER_EMAIL != '' && env.E2E_USER_PASSWORD != '' }}
        run: |
          bunx playwright test e2e/catalog/novidades-reposicao-card-parity.spec.ts \
            --project=${{ matrix.project }} \
            --reporter=list
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload artifacts (${{ matrix.project }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: card-parity-${{ matrix.project }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
