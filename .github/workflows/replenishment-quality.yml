name: CI - Replenishment Module Quality Gate

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
      
      - name: Install dependencies
        run: bun install
        
      - name: Lint check
        run: bun run lint
        
      - name: Type check
        # tsconfig.app.json (gate canônico do repo): o tsconfig raiz inclui
        # vite.config.ts e parseia .d.ts de plugins, que quebram com o skew de
        # versões resolvido pelo bun (TS1003 em @vitejs/plugin-react-swc).
        run: bunx tsc -p tsconfig.app.json --noEmit
        
      - name: Run Module Tests (Unit & Integration)
        run: bunx vitest run src/hooks/products/__tests__/useReplenishments.integration.test.ts
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        
      - name: Run E2E Tests (Smoke)
        # continue-on-error: E2E smoke requires a running dev server and Supabase backend;
        # the audit job focuses on unit/integration quality, so E2E is best-effort here.
        continue-on-error: true
        run: |
          bunx playwright install --with-deps chromium
          bunx playwright test e2e/replenishment-stress.spec.ts --pass-with-no-tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Coverage Report
        run: bunx vitest run --coverage --include="src/hooks/products/useReplenishments.ts"
