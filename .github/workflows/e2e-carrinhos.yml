name: E2E Carrinhos (limite de 10)
on:
  push:
    branches: [main, master]
    paths:
      - 'src/components/cart/**'
      - 'src/pages/products/**'
      - 'src/hooks/products/useSellerCarts.ts'
      - 'e2e/carrinhos/**'
      - 'e2e/helpers/cart-mock.ts'
      - '.github/workflows/e2e-carrinhos.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/components/cart/**'
      - 'src/pages/products/**'
      - 'src/hooks/products/useSellerCarts.ts'
      - 'e2e/carrinhos/**'
      - 'e2e/helpers/cart-mock.ts'
      - '.github/workflows/e2e-carrinhos.yml'
  workflow_dispatch:

# Required check (ver .github/required-checks.json → ruleset "main"/"release"):
# este job bloqueia merges quando popover-footer-matrix.spec.ts detectar clipping
# do footer ou regressão visual nos snapshots âncora (375x560/812, 1280x720, 1920x1080).
jobs:
  carrinhos:
    timeout-minutes: 25
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      E2E_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npm run test:e2e:install

      # Roda toda a suíte de carrinhos (inclui popover-footer-matrix.spec.ts e
      # popover-scroll.spec.ts). Falha = merge bloqueado pelo branch protection.
      - name: Run E2E — Carrinhos (limite 10 + popover footer matrix)
        run: npm run test:e2e:carrinhos -- --retries=2

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-carrinhos
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      # Em falha: sobe snapshots de regressão visual (atual + esperado + diff)
      # para o revisor decidir se aceita o novo baseline.
      - name: Upload snapshot diffs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cart-popover-snapshot-diffs
          path: |
            test-results/**/*-actual.png
            test-results/**/*-expected.png
            test-results/**/*-diff.png
            test-results/**/trace.zip
          retention-days: 14
          if-no-files-found: ignore
