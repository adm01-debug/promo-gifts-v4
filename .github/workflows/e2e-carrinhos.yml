name: E2E Carrinhos (limite de 10)
on:
  push:
    branches: [main, master]
    paths:
      - 'src/components/cart/**'
      - 'src/pages/products/**'
      - 'src/hooks/products/useSellerCarts.ts'
      - 'e2e/carrinhos/**'
      - 'e2e/helpers/cart-mock.ts'
      - '.github/workflows/e2e-carrinhos.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/components/cart/**'
      - 'src/pages/products/**'
      - 'src/hooks/products/useSellerCarts.ts'
      - 'e2e/carrinhos/**'
      - 'e2e/helpers/cart-mock.ts'
      - '.github/workflows/e2e-carrinhos.yml'
  workflow_dispatch:

jobs:
  carrinhos:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      E2E_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npm run test:e2e:install
      - name: Run E2E — Carrinhos (limite 10)
        run: npm run test:e2e:carrinhos -- --retries=2
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-carrinhos
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore
