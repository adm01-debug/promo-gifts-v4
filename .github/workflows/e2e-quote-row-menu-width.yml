name: E2E — Quote Row Menu Width

on:
  push:
    branches: [main, master]
    paths:
      - 'src/components/quotes/QuotesConfigurableList.tsx'
      - 'src/index.css'
      - 'e2e/quotes/quote-row-menu-width*.spec.ts'
      - '.github/workflows/e2e-quote-row-menu-width.yml'
  pull_request:
    paths:
      - 'src/components/quotes/QuotesConfigurableList.tsx'
      - 'src/index.css'
      - 'e2e/quotes/quote-row-menu-width*.spec.ts'
      - '.github/workflows/e2e-quote-row-menu-width.yml'
  workflow_dispatch:

jobs:
  menu-width:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      E2E_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
    strategy:
      fail-fast: false
      matrix:
        viewport: [desktop, mobile]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run quote-row-menu-width specs (${{ matrix.viewport }})
        env:
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
        run: |
          npx playwright test \
            e2e/quotes/quote-row-menu-width.spec.ts \
            e2e/quotes/quote-row-menu-width-zoom.spec.ts \
            --project=chromium-authed \
            --grep "${{ matrix.viewport }}" \
            --reporter=list
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-menu-width-${{ matrix.viewport }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14
          if-no-files-found: ignore
