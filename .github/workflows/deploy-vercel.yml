name: Deploy to Vercel

# Build e deploy automático para Vercel a cada push em main.
# PRs geram preview deploys; main vai para produção.
#
# Pré-requisitos (Settings → Secrets and variables → Actions → New repository secret):
#   - VERCEL_TOKEN     → https://vercel.com/account/tokens
#   - VERCEL_ORG_ID    → cat .vercel/project.json (após `vercel link` local)
#   - VERCEL_PROJECT_ID→ idem
#
# Variáveis de ambiente do build (VITE_*) devem estar configuradas no painel
# do Vercel → Project → Settings → Environment Variables.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        if: github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Pull Vercel environment (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (production)
        if: github.ref == 'refs/heads/main'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (preview)
        if: github.ref != 'refs/heads/main'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        if: github.ref == 'refs/heads/main'
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "🚀 Production: $URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Deploy to Vercel (preview)
        if: github.ref != 'refs/heads/main'
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "👀 Preview: $URL" >> "$GITHUB_STEP_SUMMARY"
