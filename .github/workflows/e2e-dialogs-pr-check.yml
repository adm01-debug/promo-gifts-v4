name: E2E · Dialogs visual PR check
# Roda os specs de AlertDialog, ConfirmDialog e Dialog em PRs para main.
# NÃO atualiza baselines — falha se houver divergência visual. Atualização
# fica exclusivamente nos workflows manuais:
#   - E2E · Update Alert Dialog snapshots
#   - E2E · Update Confirm Dialog snapshots
#   - E2E · Update Dialog snapshots (se/quando existir; hoje via dispatch abaixo)
on:
  pull_request:
    branches: [main]
    paths:
      - "e2e/ui/alert-dialog-visual.spec.ts"
      - "e2e/ui/confirm-dialog-visual.spec.ts"
      - "e2e/ui/dialog-visual.spec.ts"
      - "src/pages/dev/AlertDialogHarness.tsx"
      - "src/pages/dev/ConfirmDialogHarness.tsx"
      - "src/pages/dev/DialogHarness.tsx"
      - "src/components/ui/alert-dialog.tsx"
      - "src/components/ui/dialog.tsx"
      - "src/components/common/ConfirmDialog.tsx"
      - "package.json"
      - "playwright.config.ts"
      - ".github/workflows/e2e-dialogs-pr-check.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: e2e-dialogs-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  visual-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lockb', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Bootstrap (install deps + chromium)
        run: npm run e2e:bootstrap
      - name: Start Vite (background)
        run: |
          nohup bun run dev > /tmp/vite.log 2>&1 &
          # Aguarda o servidor responder em 8080 (até 60s)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 >/dev/null; then
              echo "vite up"
              exit 0
            fi
            sleep 1
          done
          echo "vite não subiu em 60s" >&2
          tail -n 100 /tmp/vite.log >&2
          exit 1
      - name: Run dialogs visual specs (fail-on-diff)
        run: npm run e2e:dialogs
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dialogs-pr
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
      - name: Comentar no PR em caso de falha
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '❌ **Snapshots visuais dos dialogs divergiram.**',
              '',
              'Se a mudança é intencional, atualize os baselines localmente:',
              '```bash',
              'npm run e2e:bootstrap',
              'npm run e2e:dialogs:update',
              '```',
              '',
              'Ou dispare manualmente um dos workflows de atualização:',
              '- **E2E · Update Alert Dialog snapshots**',
              '- **E2E · Update Confirm Dialog snapshots**',
              '',
              'Baixe o report em `playwright-report-dialogs-pr` para ver o diff pixel a pixel.',
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
