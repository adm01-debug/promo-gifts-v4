name: Gate 5 — Supabase Security Audit

# Executa em push para main e PRs que tocam migrations ou integrações Supabase.
# Usa secrets já configurados no repositório:
#   SUPABASE_ACCESS_TOKEN      → Supabase CLI personal access token
#   VITE_SUPABASE_URL          → https://doufsxqlfjyuvxuezpln.supabase.co
#   VITE_SUPABASE_PROJECT_ID   → doufsxqlfjyuvxuezpln
#   VITE_SUPABASE_PUBLISHABLE_KEY → anon key (scripts têm fallback graceful se anon não tiver acesso a system tables)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'supabase/migrations/**'
      - 'src/integrations/supabase/**'
      - '.github/workflows/supabase-security-gate.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'supabase/migrations/**'
      - 'src/integrations/supabase/**'

jobs:
  supabase-security-gate:
    name: Gate 5 — DB Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ─────────────────────────────────────────────
      # CHECK 1: lint das migrations (idempotência, style)
      # Nota: --project-id foi removido do CLI; usamos supabase link + --linked.
      # ─────────────────────────────────────────────
      - name: 🔗 Link Supabase project
        run: supabase link --project-ref "${{ secrets.VITE_SUPABASE_PROJECT_ID }}"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🔍 Lint migrations
        run: |
          supabase db lint \
            --linked \
            --schema public \
            --level warning
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: false

      # ─────────────────────────────────────────────
      # CHECK 2: auditoria de SECURITY DEFINER
      # Falha se alguma função não tiver search_path explícito.
      # Obs.: usa anon key; script tem fallback graceful se system tables
      #       não estiverem acessíveis via PostgREST.
      # ─────────────────────────────────────────────
      - name: 🔒 Audit SECURITY DEFINER functions
        run: node scripts/check-security-definer-audit.mjs
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # ─────────────────────────────────────────────
      # CHECK 3: smoke test da RPC get_profile_and_roles
      # ─────────────────────────────────────────────
      - name: 🩺 RPC get_profile_and_roles smoke test
        run: node scripts/check-rpc-get-profile-and-roles.mjs
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}

      # ─────────────────────────────────────────────
      # CHECK 4: verifica que anon NÃO tem EXECUTE na RPC
      # ─────────────────────────────────────────────
      - name: 🚫 Verify anon cannot execute RPC
        run: node scripts/check-rpc-permissions.mjs
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
