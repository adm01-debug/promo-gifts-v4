name: Gate 5 — Supabase Security Audit

# Executa em push para main e PRs.
# Requer o secret SUPABASE_ACCESS_TOKEN configurado em:
# Settings > Secrets and variables > Actions > New repository secret
# Valor: token pessoal do Supabase CLI (supabase login --token ...)

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'supabase/migrations/**'
      - 'src/integrations/supabase/**'
      - '.github/workflows/supabase-security-gate.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'supabase/migrations/**'
      - 'src/integrations/supabase/**'

jobs:
  supabase-security-gate:
    name: Gate 5 — DB Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # ─────────────────────────────────────────────
      # CHECK 1: lint das migrations (idempotência, style)
      # Falha se migration tiver erros de sintaxe.
      # ─────────────────────────────────────────────
      - name: Lint migrations
        run: |
          supabase db lint \
            --project-id ${{ secrets.SUPABASE_PROJECT_ID || 'doufsxqlfjyuvxuezpln' }} \
            --schema public \
            --level warning
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        continue-on-error: false

      # ─────────────────────────────────────────────
      # CHECK 2: auditoria de SECURITY DEFINER
      # Garante que nenhuma nova função SECURITY DEFINER
      # foi criada sem search_path explícito (vetor de privilege escalation).
      # ─────────────────────────────────────────────
      - name: Audit SECURITY DEFINER functions
        run: |
          node scripts/check-security-definer-audit.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ─────────────────────────────────────────────
      # CHECK 3: smoke test da RPC get_profile_and_roles
      # Verifica que a RPC existe, tem SECURITY DEFINER
      # e statement_timeout configurado.
      # ─────────────────────────────────────────────
      - name: RPC get_profile_and_roles smoke test
        run: |
          node scripts/check-rpc-get-profile-and-roles.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      # ─────────────────────────────────────────────
      # CHECK 4: verifica que anon NÃO tem EXECUTE na RPC
      # ─────────────────────────────────────────────
      - name: Verify anon cannot execute RPC
        run: |
          node scripts/check-rpc-permissions.mjs
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
