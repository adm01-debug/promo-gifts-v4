name: E2E • ColorSwatch 2 linhas (Grid)

# Gate de regressão visual + estrutural para o ColorSwatch no ProductCard:
#  - Altura travada em 2 linhas em mobile/tablet/desktop/wide
#  - Chip "+N" cobre o overflow corretamente (visíveis + ocultas = total)
#  - Sem clipping em hover/focus/selected
#  - Screenshots anexados por breakpoint para revisão visual de PR

on:
  push:
    branches: [main, master]
    paths:
      - 'src/components/products/ProductCard.tsx'
      - 'src/components/products/ProductColorSwatches.tsx'
      - 'src/components/shared/ColorSwatch.tsx'
      - 'src/index.css'
      - 'e2e/catalog/color-swatch-two-lines-grid.spec.ts'
      - 'e2e/catalog/color-swatch-selected-no-clip.spec.ts'
      - 'e2e/catalog/color-swatch-wrap-visual.spec.ts'
      - '.github/workflows/e2e-color-swatch-grid.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/components/products/ProductCard.tsx'
      - 'src/components/products/ProductColorSwatches.tsx'
      - 'src/components/shared/ColorSwatch.tsx'
      - 'src/index.css'
      - 'e2e/catalog/color-swatch-two-lines-grid.spec.ts'
      - 'e2e/catalog/color-swatch-selected-no-clip.spec.ts'
      - 'e2e/catalog/color-swatch-wrap-visual.spec.ts'
      - '.github/workflows/e2e-color-swatch-grid.yml'

concurrency:
  group: e2e-color-swatch-grid-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
  E2E_BASE_URL: http://localhost:8080

jobs:
  color-swatch-grid:
    name: ColorSwatch grid (2 linhas + clipping + +N)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
      - run: npm ci
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run ColorSwatch grid suite
        run: |
          npx playwright test \
            e2e/catalog/color-swatch-two-lines-grid.spec.ts \
            e2e/catalog/color-swatch-selected-no-clip.spec.ts \
            --project=chromium-authed \
            --reporter=line,html
      - name: Upload report + screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: color-swatch-grid-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
