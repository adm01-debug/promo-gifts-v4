name: Magazine Unit Tests

on:
  push:
    branches: [main]
    paths:
      - 'src/pages/magazine/**'
      - 'src/hooks/auth/**'
      - 'src/contexts/AuthContext.tsx'
      - 'src/lib/supabase/**'
  pull_request:
    paths:
      - 'src/pages/magazine/**'
      - 'src/hooks/auth/**'
      - 'src/contexts/AuthContext.tsx'
      - 'src/lib/supabase/**'

concurrency:
  group: magazine-unit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Vitest Unit Tests (Magazine)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Vitest (magazine module)
        run: |
          npx vitest run \
            --reporter=verbose \
            --coverage \
            src/pages/magazine/__tests__/
        env:
          CI: true
          NODE_ENV: test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magazine-coverage
          path: coverage/
          retention-days: 7

  # Summary check required by branch protection
  magazine-tests-ok:
    name: Magazine Tests OK
    needs: [unit-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check result
        run: |
          if [ '${{ needs.unit-tests.result }}' = 'success' ]; then
            echo '✅ All magazine unit tests passed'
          else
            echo '❌ Magazine unit tests failed'
            exit 1
          fi
