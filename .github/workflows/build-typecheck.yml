name: Build & Typecheck (PR)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-typecheck:
    name: npm run build + tsc --noEmit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: TypeScript — tsc --noEmit
        run: npx tsc --noEmit -p tsconfig.app.json

      - name: Build (production)
        run: npm run build
        env:
          # Placeholders para não quebrar env-check em CI sem secrets.
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'placeholder-anon-key' }}
