name: E2E • Swatch QuickView (Lista + Tabela)

# Gate de regressão para a navegação por bolinhas de cor → QuickView nas views
# Lista e Tabela. Roda em PR e push em main/master, paralelizado por browser
# (chromium/firefox/webkit) para validar foco, teclado e a11y de forma consistente.

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: e2e-swatch-quickview-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
  E2E_BASE_URL: http://localhost:8080

jobs:
  swatch-quickview:
    name: ${{ matrix.browser }} • swatch→QV
    timeout-minutes: 25
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: lts/*, cache: npm }
      - run: npm ci
      - name: Install Playwright + deps (${{ matrix.browser }})
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: Run swatch→QuickView suite (V1 fallback + V2)
        run: |
          npx playwright test \
            e2e/catalog/swatch-quickview-list-table.spec.ts \
            e2e/catalog/swatch-quickview-v2-list-table.spec.ts \
            --project=${{ matrix.browser }}-authed \
            --reporter=line,html
      - name: Upload report + traces + videos (${{ matrix.browser }})
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-swatch-qv-${{ matrix.browser }}-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
