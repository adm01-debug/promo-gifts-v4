name: E2E · Update Confirm Dialog snapshots
# Executa `playwright test --update-snapshots` para o spec do ConfirmDialog
# e faz commit dos PNGs atualizados. Dispara manualmente OU quando o próprio
# spec é editado.
on:
  workflow_dispatch:
  push:
    paths:
      - "e2e/ui/confirm-dialog-visual.spec.ts"
      - "src/pages/dev/ConfirmDialogHarness.tsx"

permissions:
  contents: write

jobs:
  update-snapshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Bootstrap (install deps + chromium)
        run: npm run e2e:bootstrap
      - name: Update baselines
        run: npm run e2e:confirm-dialog:update
      - name: Commit updated snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A e2e/ui/confirm-dialog-visual.spec.ts-snapshots || true
          if git diff --cached --quiet; then
            echo "Sem mudanças de baseline."
          else
            git commit -m "chore(e2e): update ConfirmDialog visual snapshots [skip ci]"
            git push
          fi
