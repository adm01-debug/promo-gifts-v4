name: Supabase Linter Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  schedule:
    # Roda diariamente às 06:00 UTC para detectar drift fora de PR
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  linter:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Supabase linter against baseline
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || 'doufsxqlfjyuvxuezpln' }}
        run: node scripts/check-supabase-linter.mjs
