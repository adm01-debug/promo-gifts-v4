# Dry-run da migração `magazineService` → queries tipadas.
#
# Em PRs / pushes que tocam magazineService.ts, types.ts ou os artefatos
# do PR armado, este workflow:
#   1. Detecta se types.ts já contém as tabelas magazines/magazine_items.
#   2. Se SIM  → executa apply-magazine-typed-queries.sh em cópia temporária,
#      roda tsgo, lint-untyped-from e a suíte vitest do módulo. Bloqueia o
#      merge se qualquer passo quebrar (isto é, "as queries tipadas quebraram
#      algo" = red).
#   3. Se NÃO → sai como neutro/skip com aviso (o PR de regeneração ainda
#      precisa entrar antes; o dry-run não pode falhar por essa razão).
#
# Nunca commita mudanças — este é um dry-run puro de validação. Aplicação
# real continua manual (bash docs/plans/apply-magazine-typed-queries.sh no
# PR de migração).

name: Magazine typed queries — dry-run

on:
  pull_request:
    paths:
      - 'src/services/magazineService.ts'
      - 'src/integrations/supabase/types.ts'
      - 'docs/plans/apply-magazine-typed-queries.sh'
      - 'docs/plans/magazine-typed-queries-migration.patch'
      - '.github/workflows/magazine-typed-queries.yml'
  push:
    branches: [main]
    paths:
      - 'src/services/magazineService.ts'
      - 'src/integrations/supabase/types.ts'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: magazine-typed-queries-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    name: Aplica patch em cópia e valida
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detecta se types.ts está pronto
        id: gate
        run: |
          if grep -qE "magazines: \{" src/integrations/supabase/types.ts \
             && grep -qE "magazine_items: \{" src/integrations/supabase/types.ts; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "::notice::types.ts contém magazines + magazine_items → executando dry-run completo"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::types.ts ainda não regenerado — dry-run em modo skip. Rode antes 'Regenerate Supabase Types'."
          fi

      - name: Aplica script de migração (dry-run em worktree)
        if: steps.gate.outputs.ready == 'true'
        run: |
          # Roda o script no próprio checkout (não commita — o job termina
          # sem push). Se falhar, o workflow reprova o PR.
          bash docs/plans/apply-magazine-typed-queries.sh

      - name: Confirma que untypedFrom sumiu de magazineService
        if: steps.gate.outputs.ready == 'true'
        run: |
          if grep -q "untypedFrom" src/services/magazineService.ts; then
            echo "::error::apply-magazine-typed-queries.sh rodou mas 'untypedFrom' ainda aparece em magazineService.ts"
            grep -n "untypedFrom" src/services/magazineService.ts
            exit 1
          fi

      - name: Typecheck (tsgo)
        if: steps.gate.outputs.ready == 'true'
        run: npx tsgo --noEmit

      - name: Lint untypedFrom × types.ts
        if: steps.gate.outputs.ready == 'true'
        run: bash scripts/lint-untyped-from.sh

      - name: Prepara diretório do relatório
        if: always()
        run: mkdir -p qa/reports

      - name: Vitest — módulo Magazine + service
        if: steps.gate.outputs.ready == 'true'
        run: |
          set -o pipefail
          npx vitest run \
            src/services/__tests__/magazineAddProductsUnique.test.ts \
            src/services/__tests__/magazineEdgeContract.test.ts \
            src/pages/magazine/__tests__/publishAwait.regression.test.ts \
            tests/integration/magazine-service-fuzz.test.ts \
            --reporter=default 2>&1 | tee qa/reports/vitest.log

      - name: Gera relatório de revalidação
        if: always()
        env:
          READY: ${{ steps.gate.outputs.ready }}
          RUN_ID: ${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          REF: ${{ github.ref }}
          EVENT: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          STATUS: ${{ job.status }}
        run: |
          set -e
          REPORT="qa/reports/magazine-typed-queries-revalidation.md"
          TS_MAG=$(grep -cE "magazines: \{" src/integrations/supabase/types.ts || true)
          TS_MI=$(grep -cE "magazine_items: \{" src/integrations/supabase/types.ts || true)
          UF_COUNT=$(grep -c "untypedFrom" src/services/magazineService.ts || echo 0)
          FROM_MAG=$(grep -cE '\.from\(["'"'"']magazines["'"'"']' src/services/magazineService.ts || echo 0)
          FROM_MI=$(grep -cE '\.from\(["'"'"']magazine_items["'"'"']' src/services/magazineService.ts || echo 0)

          {
            echo "# Magazine Typed Queries — Revalidação"
            echo ""
            echo "- **Repo:** \`$REPO\`"
            echo "- **Ref:** \`$REF\`"
            echo "- **SHA:** \`$SHA\`"
            echo "- **Run:** #$RUN_NUMBER (\`$RUN_ID\`)"
            echo "- **Evento:** \`$EVENT\` por @\`$ACTOR\`"
            echo "- **Status do job:** \`$STATUS\`"
            echo "- **Gate types.ts pronto:** \`$READY\`"
            echo ""
            echo "## Contagens"
            echo ""
            echo "| Métrica | Valor | Esperado |"
            echo "|---|---:|---:|"
            echo "| \`magazines: {\` em types.ts | $TS_MAG | ≥ 1 |"
            echo "| \`magazine_items: {\` em types.ts | $TS_MI | ≥ 1 |"
            echo "| \`untypedFrom\` em magazineService.ts | $UF_COUNT | 0 (pós-apply) |"
            echo "| \`.from('magazines')\` tipado | $FROM_MAG | 13 |"
            echo "| \`.from('magazine_items')\` tipado | $FROM_MI | 10 |"
            echo ""
            echo "## Etapas"
            echo ""
            if [[ "$READY" == "true" ]]; then
              echo "- Apply script: executado"
              echo "- tsgo --noEmit: ver log do job"
              echo "- lint-untyped-from: ver log do job"
              echo "- vitest (4 suítes): ver \`vitest.log\`"
            else
              echo "- Skip: types.ts ainda não contém magazines/magazine_items. Rode 'Regenerate Supabase Types' antes."
            fi
            echo ""
            echo "_Gerado automaticamente em $(date -u +'%Y-%m-%dT%H:%M:%SZ')._"
          } > "$REPORT"

          # JSON estruturado para consumidores automáticos
          cat > qa/reports/magazine-typed-queries-revalidation.json <<JSON
          {
            "repo": "$REPO",
            "ref": "$REF",
            "sha": "$SHA",
            "run_id": "$RUN_ID",
            "run_number": "$RUN_NUMBER",
            "event": "$EVENT",
            "actor": "$ACTOR",
            "job_status": "$STATUS",
            "types_ready": "$READY",
            "counts": {
              "types_magazines": $TS_MAG,
              "types_magazine_items": $TS_MI,
              "untyped_from_remaining": $UF_COUNT,
              "from_magazines": $FROM_MAG,
              "from_magazine_items": $FROM_MI
            },
            "generated_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          }
          JSON

          echo "::notice::Relatório gerado em $REPORT"
          cat "$REPORT" >> "$GITHUB_STEP_SUMMARY"

      - name: Publica artifact de auditoria
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: magazine-typed-queries-revalidation-${{ github.run_number }}
          path: qa/reports/
          retention-days: 90
          if-no-files-found: error

      - name: Resumo
        if: always()
        run: |
          if [[ "${{ steps.gate.outputs.ready }}" == "true" ]]; then
            echo "::notice::Dry-run completo — relatório publicado como artifact."
          else
            echo "::notice::Dry-run em modo skip — relatório publicado com gate=false para auditoria."
          fi
