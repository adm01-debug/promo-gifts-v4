name: db-schema-drift-check

# =============================================================================
# Drift check entre as migrations versionadas (supabase/migrations/**) e o
# schema REAL do projeto canonico no Supabase. Pega casos como uma tabela/view
# criada direto em producao (via Studio/MCP) que nunca virou migration —
# exatamente o que aconteceu com public.ai_enrichment_queue.
#
# Como funciona:
#   1. supabase link --project-ref <ref>  (Management API token + senha do DB)
#   2. supabase db diff --linked --schema public
#      -> DDL necessario p/ alinhar o shadow (migrations) ao remoto.
#         Migrations descrevendo 100% do schema => diff VAZIO.
#         Qualquer DDL restante = objeto em prod sem migration = DRIFT.
#   3. Falha o job se sobrar DDL (apos remover comentarios e linhas em branco).
#
# Roda:
#   - cron diario (06:30 BRT = 09:30 UTC) — offset do edge-functions-drift-check
#   - PRs que tocam supabase/migrations/** ou supabase/config.toml
#   - manual (workflow_dispatch)
#
# Secrets (Settings -> Secrets and variables -> Actions):
#   - SUPABASE_ACCESS_TOKEN : PAT da Management API
#                             https://supabase.com/dashboard/account/tokens
#   - SUPABASE_DB_PASSWORD  : senha do banco do projeto (Database settings)
#
# SAFE-BY-DEFAULT: faltando algum secret, o job apenas emite WARNING e passa
# (verde) — nunca bloqueia o CI ate os secrets serem configurados.
#
# Variavel sobrescrivivel (nao-secret):
#   SUPABASE_PROJECT_REF (default: doufsxqlfjyuvxuezpln)
# =============================================================================

on:
  schedule:
    - cron: '30 9 * * *'   # 06:30 BRT
  pull_request:
    paths:
      - 'supabase/migrations/**'
      - 'supabase/config.toml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: db-schema-drift-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Migrations x Canonical schema
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF || 'doufsxqlfjyuvxuezpln' }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Guard - secrets presentes?
        id: guard
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN e/ou SUPABASE_DB_PASSWORD ausentes - drift check PULADO (safe-by-default). Configure os secrets para ativar o gate."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Supabase CLI
        if: steps.guard.outputs.enabled == 'true'
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link canonical project
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" -p "$SUPABASE_DB_PASSWORD"

      - name: Schema drift check (migrations x remote)
        if: steps.guard.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          supabase db diff --linked --schema public > /tmp/schema_drift.sql 2> /tmp/diff.stderr || {
            echo "::error::supabase db diff falhou:"; cat /tmp/diff.stderr; exit 1;
          }
          grep -vE '^[[:space:]]*(--.*)?$' /tmp/schema_drift.sql 2>/dev/null \
            | grep -viE 'no schema changes found' > /tmp/schema_drift.clean || true
          if [ -s /tmp/schema_drift.clean ]; then
            cnt=$(wc -l < /tmp/schema_drift.clean | tr -d ' ')
            {
              echo "## Schema drift detectado"
              echo
              echo "O schema canonico tem DDL ($cnt+ linha(s)) nao descrito pelas migrations versionadas."
              echo "Provavel objeto criado direto em producao sem migration."
              echo
              echo "### DDL para reconciliar (gere uma migration com isto):"
              echo '```sql'
              cat /tmp/schema_drift.sql
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::error::Schema drift detectado - veja o job summary / artifact."
            exit 1
          fi
          {
            echo "## Sem drift de schema"
            echo
            echo "Migrations versionadas descrevem 100% do schema public do projeto canonico."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift artifact
        if: ${{ always() && steps.guard.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-sql
          path: /tmp/schema_drift.sql
          if-no-files-found: ignore
          retention-days: 14
