name: Quote Builder Delivery Quality
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci

    - name: 🧪 Unit Tests (Vitest)
      run: npx vitest run src/pages/__tests__/QuoteBuilderDeliveryTooltip.test.tsx

    - name: 🎭 Install Playwright
      run: npx playwright install --with-deps chromium

    - name: 🌍 E2E & Visual Regression
      if: env.E2E_USER_EMAIL != ''
      run: npx playwright test e2e/quote-builder-delivery.spec.ts
      env:
        CI: true

    - name: 📦 Upload Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: delivery-quality-report
        path: |
          playwright-report/
          test-results/
        retention-days: 7
        if-no-files-found: ignore
