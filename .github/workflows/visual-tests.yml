name: Visual Baseline Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  visual-baseline:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Validate visual specs exist (fail-fast antes do Playwright)
      run: node scripts/check-visual-tests-specs.mjs

    - name: Clear Cache & Artifacts
      run: |
        rm -rf e2e-artifacts/
        rm -rf playwright-report/
        rm -rf test-results/

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Visual Tests (update missing baselines)
      run: npx playwright test --update-snapshots --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} e2e/flows/99-auth-ui-baseline.spec.ts e2e/flows/supplier-comparison-visual.spec.ts e2e/flows/31-promoflix-player.spec.ts e2e/tooltips-a11y.spec.ts e2e/optimized-image-visual.spec.ts e2e/routes/app/replenishment-grid-visual.spec.ts e2e/routes/app/novelty-grid-visual.spec.ts e2e/routes/app/novelty-card-variations.spec.ts e2e/flows/voice-tooltip.spec.ts e2e/product-card-visual-regression.spec.ts e2e/catalog/product-card-badges-visual.spec.ts e2e/catalog/product-card-to-superfilter.spec.ts e2e/catalog/swatch-picker-v2-visual-baseline.spec.ts e2e/catalog/swatch-picker-v2-focus-and-quickview.spec.ts e2e/catalog/superfiltro-toolbar-actions-alignment.spec.ts e2e/flows/03d-superfiltro-toolbar-alignment.spec.ts e2e/admin/stock-dashboard-visual.spec.ts e2e/admin/stock-dashboard-layout.spec.ts e2e/admin/stock-health-badges.spec.ts
      env:
        CI: true

    - name: Commit new baselines if generated
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add --force 'e2e/**/*.png' '**/*.spec.ts-snapshots/**' 2>/dev/null || true
        if ! git diff --staged --quiet; then
          TARGET_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # PR checks run on a detached merge-commit HEAD.  Rebasing that commit
          # onto the PR branch creates add/add conflicts for every file the PR
          # touched.  Fix: save the new PNG blobs, switch to the real branch tip,
          # paste them there, then commit and push from a proper (non-merge) HEAD.
          STAGED_LIST=$(git diff --staged --name-only)
          TMPDIR_PNGS=$(mktemp -d)
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "${TMPDIR_PNGS}/$(dirname "$f")"
            cp "$f" "${TMPDIR_PNGS}/$f"
          done <<< "$STAGED_LIST"
          git fetch origin "${TARGET_BRANCH}"
          git checkout -B _baseline-push "origin/${TARGET_BRANCH}"
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "$(dirname "$f")"
            cp "${TMPDIR_PNGS}/$f" "$f"
          done <<< "$STAGED_LIST"
          git add --force 'e2e/**/*.png' '**/*.spec.ts-snapshots/**' 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore(e2e): auto-generate missing visual baselines"
            # Retry loop handles the parallel-shard race: both shards add different
            # PNG files to the same branch, so the loser does a clean rebase and retries.
            for attempt in 1 2 3 4 5; do
              if git push origin "HEAD:${TARGET_BRANCH}"; then
                echo "Baselines pushed (attempt ${attempt})."
                break
              fi
              echo "Push rejected (attempt ${attempt}) — fetch + rebase and retry."
              git fetch origin "${TARGET_BRANCH}"
              git rebase "origin/${TARGET_BRANCH}" || { git rebase --abort; exit 1; }
              sleep $(( (RANDOM % 4) + 1 ))
            done
          fi
        fi

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 30

    - name: Upload visual diffs (actual / expected / diff)
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-visual-diffs-${{ matrix.shardIndex }}
        path: |
          test-results/**/*-actual.png
          test-results/**/*-expected.png
          test-results/**/*-diff.png
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload generated baseline PNGs
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-baselines-${{ matrix.shardIndex }}
        path: |
          e2e/**/*.png
          **/*.spec.ts-snapshots/**/*.png
        if-no-files-found: ignore
        retention-days: 30
