name: Visual Baseline Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  visual-baseline:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        shardIndex: [1, 2]
        shardTotal: [2]
    timeout-minutes: 60
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Clear Cache & Artifacts
      run: |
        rm -rf e2e-artifacts/
        rm -rf playwright-report/
        rm -rf test-results/

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Visual Tests (update missing baselines)
      run: npx playwright test --update-snapshots --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }} e2e/flows/99-auth-ui-baseline.spec.ts e2e/flows/supplier-comparison-visual.spec.ts e2e/flows/31-promoflix-player.spec.ts e2e/tooltips-a11y.spec.ts e2e/optimized-image-visual.spec.ts e2e/routes/app/replenishment-grid-visual.spec.ts e2e/routes/app/novelty-grid-visual.spec.ts e2e/routes/app/novelty-card-variations.spec.ts e2e/flows/voice-tooltip.spec.ts e2e/product-card-visual-regression.spec.ts
      env:
        CI: true

    - name: Commit new baselines if generated
      if: always()
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add --force 'e2e/**/*.png' '**/*.spec.ts-snapshots/**' 2>/dev/null || true
        if ! git diff --staged --quiet; then
          git commit -m "chore(e2e): auto-generate missing visual baselines [skip ci]"
          # CI runs on detached HEAD (merge commit); push explicitly to the PR branch.
          TARGET_BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}"
          # The matrix runs shards in parallel; both may push baselines for distinct
          # PNG files to the same branch. Rebase + retry so the losing shard's push
          # is replayed on top of the winner's (different files => no conflicts).
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${TARGET_BRANCH}"; then
              echo "Baselines pushed (attempt ${attempt})."
              break
            fi
            echo "Push rejected (attempt ${attempt}) — fetch + rebase and retry."
            git fetch origin "${TARGET_BRANCH}"
            git rebase "origin/${TARGET_BRANCH}" || { git rebase --abort; exit 1; }
            sleep $(( (RANDOM % 4) + 1 ))
          done
        fi

    - name: Upload Test Report
      if: always()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report-${{ matrix.shardIndex }}
        path: playwright-report/
        retention-days: 30
