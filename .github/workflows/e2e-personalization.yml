name: E2E — Personalization Flow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-personalization-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  FORCE_COLOR: "0"
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

jobs:
  personalization-tests:
    name: E2E — Personalization Journey
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Pre-generate E2E fixtures
        run: npm run e2e:generate-fixtures

      - name: Start dev server
        run: npm run dev &
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Wait for server
        run: timeout 120 bash -c 'until curl -sf http://localhost:8080 > /dev/null 2>&1; do sleep 1; done'

      - name: Setup auth state
        run: |
          if [ -n "$E2E_USER_EMAIL" ] && [ -n "$E2E_USER_PASSWORD" ]; then
            npx playwright test --project=setup
          fi
        env:
          E2E_BASE_URL: http://localhost:8080
        continue-on-error: true

      - name: Run Personalization E2E Tests
        run: |
          npx playwright test \
            e2e/flows/90-personalization-pdp-flow.spec.ts \
            e2e/flows/91-personalization-variant-flow.spec.ts \
            e2e/flows/92-personalization-auth-redirect.spec.ts \
            --project=chromium-authed \
            --reporter=github,list,html,json \
            --pass-with-no-tests
        env:
          E2E_BASE_URL: http://localhost:8080
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results-personalization.json
        continue-on-error: false

      - name: Upload Test Artifacts (Screenshots/Videos/Traces)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: personalization-e2e-artifacts
          path: |
            e2e-artifacts/
            playwright-report/
          retention-days: 7
          if-no-files-found: ignore