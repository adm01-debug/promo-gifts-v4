name: Deploy Gates

# Quality gates antes do deploy em main.
# Rodam em paralelo onde possível. Se QUALQUER UM falhar, bloqueia o pipeline.
#
# Ordem dos gates:
#  0. ssot-gate      - SSOT Supabase (project ID canônico) — NOVO, bloqueia todos os outros
#  1. lint+tsc       - codigo passa lint e typecheck
#  2. unit-tests     - vitest passa
#  3. e2e-smoke      - playwright smoke test (login + dashboard)
#  4. lighthouse     - perf>=75 a11y>=90 seo>=95 pwa>=80
#  5. seo-sanity     - canonical/og:url/twitter:url corretos, sem dominios proibidos
#  6. build          - vite build sem erros (gate de seguranca final)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # GATE 0: SSOT Supabase — DEVE PASSAR antes de todos os outros
  # Previne reincidência do incidente 401 de produção (2026-06-11).
  # Lovable reverteu CURRENT_PROJECT_ID 6+ vezes sem que CI detectasse.
  # ============================================================
  ssot-gate:
    name: Gate 0 - SSOT Supabase (project ID canônico)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Validate SSOT — client.ts deve apontar para doufsxqlfjyuvxuezpln
        run: node scripts/validate-supabase-config.mjs
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder

  lint-typecheck:
    name: Gate 1 - Lint + TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [ssot-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint:baseline

  unit-tests:
    name: Gate 2 - Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [ssot-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      # Gate rapido de regressao. Suites amplas seguem no CI principal:
      # `test:quality`, `Hook tests` e `Test Coverage`.
      - run: npm run test:deploy-gate
      - name: Webhook scenario matrix (contratos Zod, 0 HTTP)
        run: |
          TZ=America/Sao_Paulo npx vitest run \
            tests/contracts/webhook-scenario-matrix.test.ts \
            --reporter=dot

  e2e-smoke:
    name: Gate 3 - E2E Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ssot-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run Playwright smoke tests
        run: |
          if [ -d "e2e" ] || [ -d "tests/e2e" ] || [ -d "playwright" ]; then
            npm run test:e2e:smoke
          else
            echo "::warning::No e2e folder found, skipping (will be added in future PR)"
          fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  lighthouse:
    name: Gate 4 - Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [ssot-gate]
    env:
      VITE_SUPABASE_URL: https://placeholder.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: lighthouse-placeholder-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli@0.13.x
          lhci autorun --config=.lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  seo-sanity:
    name: Gate 5 - SEO Sanity Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [ssot-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Run SEO sanity check
        run: node scripts/seo-sanity-check.mjs

  restore-cart-rpc-gate:
    name: Gate 5.5 - RPC restore_seller_cart presente no canônico
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [ssot-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: Verificar pg_proc via PostgREST (schema cache)
        run: npm run check:restore-seller-cart-rpc
        env:
          CANONICAL_SUPABASE_URL: https://doufsxqlfjyuvxuezpln.supabase.co
          CANONICAL_SUPABASE_ANON_KEY: ${{ secrets.CANONICAL_SUPABASE_ANON_KEY }}
          # Fallback: VITE_SUPABASE_PUBLISHABLE_KEY é a anon key do projeto canônico;
          # o script já verifica CANONICAL_SUPABASE_ANON_KEY || SUPABASE_ANON_KEY.
          SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          # STRICT=1 → falha o pipeline se a anon key não estiver configurada
          # como secret. Remova/comente esta linha para permitir skip silencioso.
          STRICT: '1'

  build:
    name: Gate 6 - Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint-typecheck, seo-sanity, restore-cart-rpc-gate]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.run_id }}
          path: dist/
          retention-days: 7
