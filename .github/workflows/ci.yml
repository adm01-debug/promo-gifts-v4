name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint check
        run: npm run lint:check
        
      - name: Type check (baseline — zero regressions vs .tsc-baseline.json)
        run: node scripts/check-tsc-baseline.mjs
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
        
      - name: Build check
        run: npm run build
        
      - name: Run Unit & Integration Tests
        run: npm run test:quality
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Critical Tests
        run: npm run test:e2e:critical
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Credentials
        run: npm run audit:credentials
