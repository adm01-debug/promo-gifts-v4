name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint check
        run: npm run lint:check
        
      - name: Type check (baseline — zero regressions vs .tsc-baseline.json)
        run: node scripts/check-tsc-baseline.mjs
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.placeholder
        
      - name: Build check
        run: npm run build

      - name: FAB accessibility static gate
        run: npm run check:fab-a11y

      - name: outline-none WCAG 2.4.7 gate (ratchet)
        run: npm run check:outline-none

      - name: Banned phrases gate
        run: npm run check:removed-phrases

      - name: "Draft label regression gate (Salvar Alterações → Salvar Rascunho)"
        run: npm run check:no-salvar-alteracoes-draft

      - name: 🗑️ Sem referências residuais a QuoteComments/quote_comments
        run: node scripts/check-no-quote-comments.mjs

      - name: 🚫 Sem follow-up no frontend (src/)
        run: npm run check:no-followup-frontend

      - name: 🖼️ Iframe sandbox gate (allow-scripts + allow-same-origin)
        run: npm run check:iframe-sandbox

      - name: 🛡️ Supabase lint 0029 drift gate (SECURITY DEFINER exec)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run check:lint-0029





      - name: Run Unit & Integration Tests
        run: npm run test:quality
        
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E Critical Tests
        run: npm run test:e2e:critical
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Audit Credentials
        run: npm run audit:credentials
