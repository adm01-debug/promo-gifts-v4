name: E2E · Update Calendar snapshots
# Executa manualmente OU automaticamente quando o componente do calendário
# (ou seu spec / harness) mudar, para regenerar os PNGs baseline nos
# viewports 320/768/1280 e comitar as imagens de volta na branch alvo.
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch para comitar os baselines atualizados"
        required: true
        default: "main"
      safe_mode:
        description: "Só regenerar baselines se houver diff visual. Desmarque para forçar --update-snapshots."
        required: false
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - "src/components/ui/calendar.tsx"
      - "src/pages/__visual/CalendarHarness.tsx"
      - "e2e/ui/calendar-visual.spec.ts"
      - ".github/workflows/e2e-update-calendar-snapshots.yml"

permissions:
  contents: write

concurrency:
  group: e2e-update-calendar-${{ github.event.inputs.branch || github.ref_name }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lockb', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-
      - name: Bootstrap
        run: npm run e2e:bootstrap
      - name: Start Vite
        run: |
          nohup bun run dev > /tmp/vite.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080 >/dev/null; then exit 0; fi
            sleep 1
          done
          tail -n 100 /tmp/vite.log >&2; exit 1

      - name: Dry-run (safe mode)
        if: ${{ github.event.inputs.safe_mode != 'false' }}
        id: dryrun
        continue-on-error: true
        run: |
          PLAYWRIGHT_JSON_OUTPUT_NAME=playwright-report/results.json \
          npx playwright test e2e/ui/calendar-visual.spec.ts \
            --project=chromium-public \
            --reporter=list,json

      - name: Classificar falha (visual vs real)
        if: ${{ github.event.inputs.safe_mode != 'false' && steps.dryrun.outcome == 'failure' }}
        id: classify
        run: |
          if find test-results -type f \( -name "*-diff.png" -o -name "*-actual.png" \) 2>/dev/null | grep -q .; then
            echo "kind=visual" >> "$GITHUB_OUTPUT"
          else
            echo "kind=real" >> "$GITHUB_OUTPUT"
          fi

      - name: Abortar (falha não-visual)
        if: ${{ github.event.inputs.safe_mode != 'false' && steps.dryrun.outcome == 'failure' && steps.classify.outputs.kind == 'real' }}
        run: |
          echo "::error::Falha não é diferença visual — abortando rewrite de baselines. Corrija o erro real antes de atualizar snapshots."
          exit 1

      - name: Nada a atualizar (safe mode passou)
        if: ${{ github.event.inputs.safe_mode != 'false' && steps.dryrun.outcome == 'success' }}
        run: |
          echo "✅ Spec já passa contra baselines atuais — nenhuma atualização necessária."
          exit 0

      - name: Regenerar snapshots
        if: ${{ github.event.inputs.safe_mode == 'false' || (steps.dryrun.outcome == 'failure' && steps.classify.outputs.kind == 'visual') }}
        run: |
          npx playwright test e2e/ui/calendar-visual.spec.ts \
            --project=chromium-public \
            --update-snapshots \
            --reporter=list

      - name: Comitar baselines
        if: ${{ github.event.inputs.safe_mode == 'false' || (steps.dryrun.outcome == 'failure' && steps.classify.outputs.kind == 'visual') }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add e2e/ui/calendar-visual.spec.ts-snapshots || true
          if git diff --cached --quiet; then
            echo "Sem mudanças nos baselines."; exit 0
          fi
          MODE="${{ github.event.inputs.safe_mode != 'false' && 'safe' || 'force' }}"
          git commit -m "chore(e2e): update calendar visual baselines (${MODE})"
          git push origin HEAD:${{ github.event.inputs.branch || github.ref_name }}

      - name: Upload diffs visuais (antes/depois)
        if: ${{ always() && (steps.dryrun.outcome == 'failure' || github.event.inputs.safe_mode == 'false') }}
        uses: actions/upload-artifact@v4
        with:
          name: calendar-visual-diffs-${{ github.run_id }}
          path: |
            test-results/**/*-diff.png
            test-results/**/*-actual.png
            test-results/**/*-expected.png
            playwright-report/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload baselines regenerados
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: calendar-baselines-${{ github.run_id }}
          path: e2e/ui/calendar-visual.spec.ts-snapshots/**
          if-no-files-found: ignore
          retention-days: 14