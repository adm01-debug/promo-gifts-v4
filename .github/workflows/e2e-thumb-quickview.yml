name: E2E • Thumb QuickView (paridade entre módulos)

# Suíte focada que executa em TODO PR e bloqueia merge em caso de regressão
# (sem continue-on-error). Cobre Catálogo/Novidades/Reposição/Estoque +
# estados de borda + ESC/overlay no QuickView.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: e2e-thumb-quickview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  thumb-quickview:
    name: Playwright • 03b thumb-quickview
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      CI: "true"
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
      E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
      E2E_BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run thumb-quickview suite
        run: npx playwright test e2e/flows/03b-product-thumb-quickview.spec.ts --reporter=line,html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-thumb-quickview
          path: playwright-report/
          retention-days: 14
