name: E2E — Customization Collapse (LocationPanel)

on:
  push:
    branches: [main]
    paths:
      - 'src/components/products/customization/**'
      - 'e2e/flows/04d-customization-collapse.spec.ts'
      - 'e2e/customization/**'
      - '.github/workflows/e2e-customization-collapse.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/components/products/customization/**'
      - 'e2e/flows/04d-customization-collapse.spec.ts'
      - 'e2e/customization/**'
      - '.github/workflows/e2e-customization-collapse.yml'
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Atualizar baselines visuais (--update-snapshots)'
        type: boolean
        default: false

concurrency:
  group: e2e-customization-collapse-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: "true"
  FORCE_COLOR: "0"
  VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://doufsxqlfjyuvxuezpln.supabase.co' }}
  VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY || 'sb_publishable_tjH5qAbZ0e5HTTd872NijQ_s9m6JvYU' }}
  E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
  E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

jobs:
  collapse-e2e:
    name: LocationPanel collapse (authed)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v5

      - name: Validate required secrets
        run: |
          missing=0
          if [ -z "$E2E_USER_EMAIL" ]; then
            echo "::error::Secret E2E_USER_EMAIL não configurado no repositório."
            missing=1
          fi
          if [ -z "$E2E_USER_PASSWORD" ]; then
            echo "::error::Secret E2E_USER_PASSWORD não configurado no repositório."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::error::Configure os secrets em Settings → Secrets and variables → Actions antes de rodar este workflow."
            exit 1
          fi

      - uses: actions/setup-node@v6

        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright (chromium + deps)
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          VITE_SUPABASE_URL: ${{ env.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ env.VITE_SUPABASE_PUBLISHABLE_KEY }}

      - name: Wait for server
        run: timeout 120 bash -c 'until curl -sf http://localhost:8080 > /dev/null 2>&1; do sleep 1; done'

      - name: Setup auth state (fixture de sessão)
        id: auth
        run: |
          if [ -n "$E2E_USER_EMAIL" ] && [ -n "$E2E_USER_PASSWORD" ]; then
            npx playwright test --project=setup
            echo "authed=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::E2E_USER_EMAIL/E2E_USER_PASSWORD ausentes — spec autenticado será pulado."
            echo "authed=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          E2E_BASE_URL: http://localhost:8080

      - name: Run collapse E2E (behavior + visual reflow)
        if: steps.auth.outputs.authed == 'true'
        run: |
          UPDATE_FLAG=""
          if [ "${{ inputs.update_snapshots }}" = "true" ]; then
            UPDATE_FLAG="--update-snapshots"
          fi
          npx playwright test \
            e2e/flows/04d-customization-collapse.spec.ts \
            e2e/customization/collapse-reflow.spec.ts \
            --project=chromium-authed \
            --reporter=github,list,html,json \
            --pass-with-no-tests \
            $UPDATE_FLAG
        env:
          E2E_BASE_URL: http://localhost:8080
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-report/results-collapse.json

      - name: Commit updated baselines
        if: inputs.update_snapshots == true && steps.auth.outputs.authed == 'true'
        run: |
          if [ -n "$(git status --porcelain 'e2e/customization/**-snapshots')" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add e2e/customization/**-snapshots
            git commit -m "test(e2e): atualiza baselines visuais do colapso do LocationPanel"
            git push
          fi

      - name: Upload artifacts (diffs / report)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: customization-collapse-e2e
          path: |
            e2e-artifacts/
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
