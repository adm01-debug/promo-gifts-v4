name: Daily flows simulation

on:
  schedule:
    - cron: '0 6 * * *' # Diário 06:00 UTC
  workflow_dispatch:
    inputs:
      scale:
        description: 'Multiplicador de cenários (1 = ~600)'
        default: '3'

jobs:
  simulate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Simulate daily flows
        run: node scripts/simulate-daily-flows.mjs --scale=${{ github.event.inputs.scale || '3' }}
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-flows-simulation
          path: qa/reports/daily-flows-simulation-*.*
          retention-days: 30
