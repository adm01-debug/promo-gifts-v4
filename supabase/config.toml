# ============================================================================
# Módulo Magazine (2026-07-12) — FIX CRÍTICO pós-validação exaustiva
# ============================================================================
# GAP ENCONTRADO: as 5 edges do módulo Magazine foram deployadas SEM entrada
# neste config.toml, então caíram no default verify_jwt=true. Isso quebrava
# 100% do fluxo público (visitante anônimo lendo revista publicada) porque o
# gateway do Supabase rejeita com 401 ANTES do código da função rodar — e o
# front-end (useMagazineReaderState.ts, magazine-import-local caller) não
# envia nenhum header Authorization para essas 4 rotas públicas.

# Leitura pública de revista por token — SEM login (visitante anônimo)
[functions.magazine-public-view]
verify_jwt = false

# Reações anônimas (like/love/fire/idea) — SEM login
[functions.magazine-public-react]
verify_jwt = false

# Leitura do estado do leitor (bookmarks/last-page) — SEM login
[functions.magazine-reader-state-read]
verify_jwt = false

# Escrita do estado do leitor — SEM login
[functions.magazine-reader-state-write]
verify_jwt = false

# Import de localStorage->Gold: PRECISA de usuário autenticado (grava como
# o próprio dono via RLS) — este permanece true corretamente.
[functions.magazine-import-local]
verify_jwt = true

[auth]
enable_signup = false
enable_anonymous_sign_ins = false
